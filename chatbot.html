<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sodiqov Chat</title>
    <link rel="stylesheet" href="chatbotstyles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <!-- Modal oynasi -->
    <div class="modal" id="name-modal">
        <div class="modal-content">
            <h2>Xush kelibsiz! 😊</h2>
            <p>Iltimos, ismingizni kiriting:</p>
            <input type="text" id="name-input" placeholder="Ismingizni yozing..." required>
            <button onclick="saveUserName()">Davom etish</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <img src="Asilxon Sodiqov Logo.jpg" alt="Sodiqov Logo" class="header-logo">
            <span class="header-name">Sodiqov</span>
            <button class="clear-chat-btn" onclick="clearChat()">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Xabar yozing...">
            <button onclick="sendMessage()">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script src="chatbotscript.js"></script>
</body>
</html>
