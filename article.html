<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maqola | Asilbek Sodiqov</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --charcoal:   #2D3436;
            --charcoal-2: #3d4a4c;
            --gold:       #C9A84C;
            --gold-light: #dbbe70;
            --gold-dim:   rgba(201,168,76,.13);
            --mist:       #DFE6E9;
            --mist-2:     #edf1f3;
            --white:      #FFFFFF;
            --text:       #2D3436;
            --text-2:     #5a6a6d;
            --text-3:     #9aabad;
            --border:     #d8e2e5;
            --border-2:   #eaf0f2;
            --bg:         #f4f8f9;
            --page-bg:    #FAFAF8;
            --success:    #27ae60;

            --r:     14px;
            --r-lg:  20px;
            --r-full:9999px;
            --sh-xs: 0 1px 4px rgba(45,52,54,.07);
            --sh-sm: 0 4px 14px rgba(45,52,54,.09);
            --sh:    0 8px 28px rgba(45,52,54,.11);
            --sh-md: 0 16px 44px rgba(45,52,54,.14);
            --sh-gold: 0 6px 22px rgba(201,168,76,.28);
            --ease:  cubic-bezier(.25,.46,.45,.94);
            --spring:cubic-bezier(.34,1.56,.64,1);
            --t:     300ms;
            --tf:    160ms;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ── PROGRESS BAR ── */
        #progress-bar-wrap {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: rgba(45,52,54,.08);
            z-index: 1000;
            border-radius: var(--r-full);
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--charcoal) 0%, var(--gold) 100%);
            transition: width 100ms linear;
            border-radius: var(--r-full);
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: fixed;
            top: 3px; left: 0; right: 0;
            height: 52px;
            background: rgba(255, 255, 255, 0.5); /* Shaffoflikni biroz kamaytirdik */
            backdrop-filter: blur(25px) saturate(180%); /* Blurni kuchaytirdik, orqa fondagi matnlar o'qilmaydi */
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 1px solid var(--border-2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 999;
        }

        .top-bar__left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.5); /* Shaffoflikni biroz kamaytirdik */
            backdrop-filter: blur(25px) saturate(180%); /* Blurni kuchaytirdik, orqa fondagi matnlar o'qilmaydi */
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--r-full);
            font-size: 13px;
            font-weight: 600;
            color: var(--charcoal);
            cursor: pointer;
            transition: all var(--tf) var(--ease);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--charcoal);
            color: var(--white);
            border-color: var(--charcoal);
        }

        .back-btn i { font-size: 11px; }

        .progress-pct {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-3);
            letter-spacing: .04em;
        }

        .progress-pct span {
            color: var(--gold);
        }

        /* ── MAIN LAYOUT ── */
        .article-wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 80px 20px 60px;
        }

        /* ── WORD-STYLE PAGE ── */
        .word-page {
            background: var(--white);
            border-radius: var(--r-lg);
            box-shadow: var(--sh-md), 0 0 0 1px var(--border-2);
            padding: 56px 64px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .word-page::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            opacity: 0.4;
        }

        @media (max-width: 600px) {
            .word-page { padding: 32px 24px; }
        }

        /* Article meta */
        .article-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .meta-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: var(--r-full);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
        }

        .meta-badge--year {
            background: var(--mist-2);
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        .meta-badge--type {
            background: var(--gold-dim);
            color: var(--gold);
            border: 1px solid rgba(201,168,76,.2);
        }

        /* Article title */
        .article-title {
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 600;
            line-height: 1.35;
            color: var(--charcoal);
            margin-bottom: 12px;
        }

        @media (max-width: 600px) {
            .article-title { font-size: 22px; }
        }

        .article-author {
            font-size: 13px;
            color: var(--text-3);
            font-weight: 600;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .article-author i { color: var(--gold); font-size: 11px; }

        .article-divider {
            height: 1px;
            background: linear-gradient(90deg, var(--gold), var(--border-2));
            margin-bottom: 32px;
            opacity: 0.5;
        }

        /* Article body typography */
        .article-body-text {
            font-family: 'Lora', serif;
            font-size: 16px;
            line-height: 1.9;
            color: #3a4a4c;
        }

        .article-body-text h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--charcoal);
            margin: 36px 0 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-2);
        }

        .article-body-text h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--charcoal);
            margin: 28px 0 10px;
        }

        .article-body-text p {
            margin-bottom: 18px;
            text-align: justify;
        }

        .article-body-text p:first-child::first-letter {
            font-size: 48px;
            font-weight: 600;
            line-height: 1;
            float: left;
            margin: 4px 10px 0 0;
            color: var(--gold);
            font-family: 'Lora', serif;
        }

        .article-body-text blockquote {
            border-left: 3px solid var(--gold);
            padding: 12px 20px;
            margin: 24px 0;
            background: var(--mist-2);
            border-radius: 0 var(--r) var(--r) 0;
            font-style: italic;
            color: var(--text-2);
        }

        .article-body-text ul, 
        .article-body-text ol {
            padding-left: 24px;
            margin-bottom: 18px;
        }

        .article-body-text li {
            margin-bottom: 8px;
        }

        .article-body-text strong {
            font-weight: 600;
            color: var(--charcoal);
        }

        /* Page number */
        .page-number {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-2);
            font-size: 12px;
            color: var(--text-3);
            font-weight: 600;
            letter-spacing: .06em;
        }

        /* ── FINISH SECTION ── */
        .finish-section {
            background: var(--charcoal);
            border-radius: var(--r-lg);
            padding: 36px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .finish-section::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.18) 0%, transparent 60%);
            pointer-events: none;
        }

        .finish-icon {
            width: 56px; height: 56px;
            background: rgba(201,168,76,.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 22px;
            color: var(--gold);
        }

        .finish-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
        }

        .finish-desc {
            font-size: 13px;
            color: rgba(255,255,255,.5);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .btn-finish {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 28px;
            background: var(--gold);
            color: var(--charcoal);
            border-radius: var(--r-full);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all var(--tf) var(--ease);
            font-family: inherit;
        }

        .btn-finish:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: var(--sh-gold);
        }

        /* ── RATING MODAL ── */
        .rating-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(45,52,54,.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--t) var(--ease);
        }

        .rating-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .rating-modal {
            background: var(--white);
            border-radius: var(--r-lg);
            padding: 36px 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            transform: scale(0.92) translateY(12px);
            transition: transform 400ms var(--spring);
            box-shadow: var(--sh-md);
        }

        .rating-modal-overlay.active .rating-modal {
            transform: scale(1) translateY(0);
        }

        .rating-modal__icon {
            width: 52px; height: 52px;
            background: var(--gold-dim);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 20px;
            color: var(--gold);
        }

        .rating-modal__title {
            font-size: 20px;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 6px;
        }

        .rating-modal__desc {
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .modal-star-btn {
            font-size: 32px;
            color: var(--mist);
            transition: color var(--tf) var(--ease), transform var(--tf) var(--ease);
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px;
            line-height: 1;
        }

        .modal-star-btn.hovered,
        .modal-star-btn.selected {
            color: var(--gold);
        }

        .modal-star-btn:hover { transform: scale(1.2); }

        .modal-rating-label {
            font-size: 13px;
            color: var(--text-3);
            font-weight: 600;
            min-height: 20px;
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .btn-modal-skip {
            flex: 1;
            padding: 12px;
            background: var(--mist-2);
            color: var(--text-2);
            border-radius: var(--r);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all var(--tf) var(--ease);
        }

        .btn-modal-skip:hover {
            background: var(--border);
            color: var(--charcoal);
        }

        .btn-modal-rate {
            flex: 2;
            padding: 12px;
            background: var(--charcoal);
            color: var(--white);
            border-radius: var(--r);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all var(--tf) var(--ease);
        }

        .btn-modal-rate:hover:not(:disabled) {
            background: var(--gold);
            color: var(--charcoal);
            box-shadow: var(--sh-gold);
        }

        .btn-modal-rate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal-success {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--success);
            font-size: 14px;
            font-weight: 600;
            padding: 12px;
            animation: fadeUp 400ms var(--ease) both;
        }

        /* ── TOAST ── */
        .art-toast {
            position: fixed;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: var(--charcoal);
            color: var(--white);
            border-radius: var(--r);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--sh-md);
            z-index: 1500;
            opacity: 0;
            transition: bottom var(--t) var(--ease), opacity var(--t) var(--ease);
            pointer-events: none;
            border-left: 3px solid var(--gold);
        }

        .art-toast.show {
            bottom: 24px;
            opacity: 1;
        }

        .art-toast__icon {
            font-size: 18px;
            color: var(--gold);
            flex-shrink: 0;
        }

        .art-toast__text {
            font-size: 13px;
            line-height: 1.45;
        }

        .art-toast__title {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(8px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>

<!-- Progress bar -->
<div id="progress-bar-wrap">
    <div id="progress-bar"></div>
</div>

<!-- Top bar -->
<div class="top-bar">
    <div class="top-bar__left">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Orqaga
        </button>
    </div>
    <div class="progress-pct">
        O'qildi: <span id="pct-text">0%</span>
    </div>
</div>

<!-- Article content -->
<div class="article-wrap">

    <!-- PAGE 1 -->
    <div class="word-page" id="article-container">

        <div class="article-meta">
            <span class="meta-badge meta-badge--year" id="art-year"><i class="fas fa-calendar"></i> 2024</span>
            <span class="meta-badge meta-badge--type"><i class="fas fa-file-alt"></i> Ilmiy maqola</span>
        </div>

        <h1 class="article-title" id="art-title">Maqola sarlavhasi</h1>

        <div class="article-author">
            <i class="fas fa-user-pen"></i>
            Asilbek Sodiqov
        </div>

        <div class="article-divider"></div>

        <div class="article-body-text" id="art-body">
            <!-- Maqola matni JS orqali to'ldiriladi -->
        </div>

        <div class="page-number" id="page-number">— 1 —</div>
    </div>

    <!-- Tugatish bo'limi -->
    <div class="finish-section">
        <div class="finish-icon">
            <i class="fas fa-flag-checkered"></i>
        </div>
        <h3 class="finish-title">Maqolani tugatdingiz!</h3>
        <p class="finish-desc">Vaqtingiz uchun rahmat. Fikr-mulohazangizni qoldiring yoki loyihalarga qaytib ko'ring.</p>
        <button class="btn-finish" onclick="finishArticle()">
            <i class="fas fa-check"></i> Tugatish
        </button>
    </div>

</div>

<!-- Rating modal -->
<div class="rating-modal-overlay" id="ratingModalOverlay">
    <div class="rating-modal">
        <div class="rating-modal__icon">
            <i class="fas fa-star"></i>
        </div>
        <h3 class="rating-modal__title">Maqolani baholang</h3>
        <p class="rating-modal__desc">Maqola sizga qanchalik foydali bo'ldi?</p>

        <div class="modal-stars" id="modalStars">
            <button class="modal-star-btn" data-value="1"><i class="fas fa-star"></i></button>
            <button class="modal-star-btn" data-value="2"><i class="fas fa-star"></i></button>
            <button class="modal-star-btn" data-value="3"><i class="fas fa-star"></i></button>
            <button class="modal-star-btn" data-value="4"><i class="fas fa-star"></i></button>
            <button class="modal-star-btn" data-value="5"><i class="fas fa-star"></i></button>
        </div>

        <div class="modal-rating-label" id="modalRatingLabel">Yulduzni tanlang</div>

        <div class="modal-btns" id="modalBtns">
            <button class="btn-modal-skip" onclick="skipRating()">O'tkazib yuborish</button>
            <button class="btn-modal-rate" id="modalRateBtn" disabled onclick="submitModalRating()">
                <i class="fas fa-paper-plane"></i> Baholash
            </button>
        </div>

        <div class="modal-success" id="modalSuccess" style="display:none;">
            <i class="fas fa-check-circle"></i> Rahmat! Bahongiz qabul qilindi.
        </div>
    </div>
</div>

<!-- Toast -->
<div class="art-toast" id="artToast">
    <i class="fas fa-bolt art-toast__icon"></i>
    <div class="art-toast__text">
        <span class="art-toast__title" id="toastTitle"></span>
        <span id="toastMsg"></span>
    </div>
</div>

<script>
// ── MAQOLALAR MA'LUMOTLARI ─────────────────
const articles = {
    'article-1': {
        year: '2024',
        title: 'Smart governance va ijtimoiy ishtirok: Global amaliyotlar va kommunikatsiya roli',
        body: `
            <p>Ushbu maqola fuqarolarning ijtimoiy ishtirokini oshirishda kommunikatsiyaning rolini xorijiy tajribalar asosida tahlil qiladi. Maqolaning maqsadi raqamli platformalarning boshqaruv samaradorligiga ta’sirini baholashdan iborat. Tadqiqotda smart cities va e-governance loyihalarining rivojlangan davlatlardagi amaliyotlari qiyosiy tahlil qilinadi. Natijalar samarali kommunikatsiya mexanizmlari fuqarolar ishtirokining oshishiga, shaffoflik va ishonch darajasining mustahkamlanishiga xizmat qilishini ko‘rsatadi. Xulosa qismida rivojlanayotgan mamlakatlarda smart governance tizimlarini joriy etishda mazkur tajribalarni moslashtirish bo‘yicha amaliy tavsiyalar ishlab chiqilgan.</p>

            <h2>1. Kirish</h2>
            <p>Zamonaviy sharoitda raqamli texnologiyalar va axborot-kommunikatsiya texnologiyalarining (AKT) jadal rivojlanishi davlat boshqaruvi tizimlarining transformatsiyasiga olib kelib, boshqaruv samaradorligi va shaffofligini oshirishga xizmat qilmoqda. Ushbu jarayonda smart governance (aqlli boshqaruv) konsepsiyasi muhim nazariy va amaliy yondashuv sifatida shakllanib, fuqarolarni davlat boshqaruvi jarayonlariga faol jalb etishga yo‘naltirilgan mexanizmlarni o‘z ichiga oladi. Aqlli boshqaruv nafaqat raqamli infratuzilmani joriy etishni, balki davlat va jamiyat o‘rtasidagi o‘zaro munosabatlarni yangi sifat bosqichiga olib chiqishni ham nazarda tutadi.</p>
            <p>Smart governance doirasida ijtimoiy ishtirok fuqarolarning qaror qabul qilish jarayonlarida bevosita va bilvosita ishtirokini ta’minlovchi muhim omil sifatida qaraladi. Fuqarolarning boshqaruv jarayonlariga jalb etilishi demokratiyaning mustahkamlanishi, davlat institutlariga bo‘lgan ishonchning ortishi hamda barqaror rivojlanishni ta’minlashga xizmat qiladi. Shu bois, ijtimoiy ishtirokni kuchaytiruvchi omillarni ilmiy jihatdan tahlil qilish dolzarb ahamiyat kasb etadi. Mazkur jarayonda kommunikatsiyaning roli alohida o‘rin tutadi. Ikki tomonlama aloqa va feedback (qayta aloqa)ni rag‘batlantirish mexanizmlari orqali fuqarolar passiv axborot iste’molchisidan faol ishtirokchiga aylanishi mumkin. Raqamli platformalar, elektron so‘rovnomalar hamda feedback tizimlari fuqarolarga o‘z fikr va takliflarini bildirish, davlat siyosatini shakllantirishda ishtirok etish imkonini yaratadi. Xususan, smart cities (aqlli shaharlar) va e-governance (elektron hukumat) loyihalarida kommunikatsiya mexanizmlarining qo‘llanilishi ijtimoiy faollik, shaffoflik va boshqaruv samaradorligining oshishiga xizmat qilmoqda. Biroq, ushbu jarayonlarda etika, shaxsiy ma’lumotlar maxfiyligi va raqamli savodxonlik masalalariga yetarli e’tibor qaratish zarur.</p>
            <p>Ushbu maqolaning maqsadi smart governance jarayonlarida fuqarolarning ijtimoiy ishtirokini oshirishda kommunikatsiya rolini xorijiy tajribalar asosida tahlil qilishdan iborat. Tadqiqot qiyosiy tahlil metodiga asoslanib, rivojlangan davlatlardagi smart cities va e-governance loyihalarining amaliy jihatlarini o‘rganadi. Maqolaning ilmiy ahamiyati xorijiy tajribalar natijalarini umumlashtirish hamda rivojlanayotgan mamlakatlar sharoitida ularni moslashtirish imkoniyatlarini aniqlash bilan belgilanadi. Tadqiqot natijalari kommunikatsiyani aqlli boshqaruvning asosiy omillaridan biri sifatida baholab, uning etika, maxfiylik va raqamli savodxonlik bilan bog‘liq jihatlarini yoritishga xizmat qiladi.</p>

            <h2>2. Asosiy qism</h2>
            <h3>2.1. Xitoy</h3>
            <p>Xitoyda Social Credit System fuqarolar va tashkilotlarning ijtimoiy va iqtisodiy xulq-atvorini baholashga qaratilgan keng qamrovli tashabbus sifatida shakllangan. Ushbu tizim yagona milliy ball mexanizmiga ega emas, balki asosan mahalliy pilot loyihalar orqali amalga oshiriladi. Pilot loyihalar 2014 yildagi milliy reja asosida boshlangan bo'lib, 2022 yilga kelib 62 dan ortiq mahalliy va viloyat darajasidagi dasturlar ishga tushirilgan (BMT hisobotlari bo‘yicha). Ular data to‘plash va sanksiyalarni sinash uchun mo‘ljallangan, masalan, Suzhou, Hangzhou va Rongcheng shaharlarida o‘ziga xos ball tizimlari qo‘llaniladi.</p>
            <p>Fuqarolarning qonunlarga rioya qilishi, ijtimoiy faolligi, jamoat ishlarida ishtiroki, moliyaviy majburiyatlarni bajarishi va jamoat qoidalariga amal qilishi ijobiy harakatlar sifatida qayd etiladi. Xususan, mahalliy pilot loyihalari quyidagi faollik manbalarini (INPUT) ro‘yxatga qo‘shgan: qon donorligi, volontyorlik, chiqindilarni saralash, xayriya qilish, hukumatni ijtimoiy tarmoqlarda maqtash yoki ijobiy postlar joylash (+ ballar); yo‘l qoidalari buzilishi, qarzlarni to‘lamaslik, soxta hujjatlar, restoran yoki mehmonxona bronini bekor qilmaslik, jamoat joylarini iflos holatda qoldirish, itlarni bog‘lamaslik yoki chiqindisini tozalamay qoldirish, jamoat joylarida tartibsizlik, ekologik qoidalarni buzish (- ballar). OECD hisobotlariga ko‘ra, INPUTlar mahalliy kataloglarda batafsil ko'rsatilgan.</p>
            <p>Yuqori ishonch darajasiga ega shaxslar ma’lum qulayliklardan (jamoat transportida chegirmalar, aeroprt va vokzallarda navbatsiz o‘tish, kasalxonalarda ustuvorlik, soliq va kommunal to‘lovlarda chegirmalar yoki imtiyozlar, kredit olishda past foiz stavkalari va yuqori limitlar, vizalar va pasportlarni tezlashtirilgan tartibda olish, ishga joylashishda afzallik, “ishonchli fuqaro” kabi ijtimoiy obro‘ statusi) foydalanadi. Past baholangan holatlarda esa ayrim xizmatlardan foydalanish vaqtincha cheklanadi, masalan, sayohat ta’qiqi – eng keng tarqalgan sanksiya (26.82 million fuqaro), hashamatli tovarlar sotib olish cheklovi, bolalarni xususiy maktab va universitetlarga qabul qilmaslik, kredit olishda rad etilish yoki yuqori foizlar, jamoat sharmandalash (katta ekranlarda ism va suratini ko‘rsatish), passport va viza olishda kechikish yoki rad etilish, jamoat joyida ba’zi xizmatlardan foydalanish cheklovi (masalan, mehmonxonalar, restoranlar). Shu bilan birga, so‘nggi yillarda markaziy siyosatda ball orqali jazolashni qisqartirish va ijobiy rag‘batlarga ustuvorlik berish tendensiyasi kuzatilmoqda (Merics hisoboti, 2021).</p>
            <p>Ushbu model o‘zining jazolash (sanksiya) mexanizmi bilan boshqa davlatlarda qo‘llaniladigan modellardan farq qiladi. Shuningdek, uning kuchli tomonlari sifatida quyidagilarni sanab o‘tsak bo‘ladi: fuqarolarni ijtimoiy faollikka majburiy ravishda jalb etish orqali tartib va profilaktik nazoratni ta’minlaydi, mahalliy pilot loyihalar orqali tez sinov va moslashtirish imkoniyati (62+ loyiha), katta miqyosda ma’lumotlar yig‘ish va AI orqali samarali baholash (ishonchli subyektlar ro‘yxati). Bundan tashqari zaif tomonlari sifatida repressiv elementlar tufayli fuqarolar huquqlari buzilishi mumkinligi, maxfiylik va etika muammolari, ixtiyoriylik yetishmasligi (bu ishonchni pasaytirishi mumkin) kabilarni ko‘rsatish mumkin.</p>
            <h3>2.2. Singapur</h3>
            <p>Singapurda Smart Nation tashabbusi doirasida kommunikatsiya jarayoni fuqarolarning davlat bilan muntazam va qulay muloqotini ta’minlashga yo‘naltirilgan. Bu yerda Xitoydagi kabi majburiy reputatsion ball tizimi mavjud emas. Aksincha, fuqarolar ishtiroki ixtiyoriy bo‘lib, gamification (o‘yinlashuv) elementlari orqali rag‘batlantiriladi. Asosiy platformalar – CrowdTaskSG (GovTech tomonidan boshqariladi) va GovRewards (mukofot tizimi) bo‘lib, ular fuqarolarni so‘rovnomalar, fikr bildirish va jamoa faoliyatiga jalb qiladi.</p>
            <p>Fuqarolarning raqamli xizmatlardan faol foydalanishi, hukumat so‘rovnomalarida qatnashishi, taklif va mulohazalar bildirish jarayonlari ijobiy ishtirok shakllari sifatida qaraladi. Aniqlik uchun:</p>
            <p>  - CrowdTaskSG platformasida hukumat so‘rovnomalarini to‘ldirish;</p>
            <p>  - Siyosatlar bo‘yicha fikr bildirish va taklif yuborish;</p>
            <p>  - Shahar muammolarini hal qilishda yordam berish (masalan, muammo haqida xabar berish yoki yechim taklif qilish);</p>
            <p>  - National Steps Challenge yoki Healthy 365 appda kunlik qadamlar sonini oshirish va sog‘lom hayot tarzi maqsadlarini bajarish;</p>
            <p>  - Volontyorlik faoliyati (masalan, texnologik tadbirlar, o‘quv sessiyalari yoki jamoatchilik loyihalrida ishtirok etish);</p>
            <p>  - Fikr almashish sessiyalarida qatnashish va loyihalarga taklif kiritish;</p>
            <p>  - Hukumatning pilot loyihalarida sinov foydalanuvchisi bo‘lish (beta-testerlik).</p>
            <p>Singapur tajribasida fuqarolar faolligi majburiy ball tizimi orqali emas, balki xizmatlardan foydalanish chastotasi va ixtiyoriy ishtirok darajasi asosida baholanadi. CrowdTaskSG va GovRewards platformalari doirasida so‘rovnomalarda qatnashish va fikr bildirish kabi faoliyatlar virtual birliklar, reytinglar va nishonlar orqali rag‘batlantiriladi.</p>
            <p>Faol ishtirokchilar ayrim xizmatlardan qulayroq foydalanish, pilot loyihalarda ishtirok etish yoki ijtimoiy e’tirofga ega bo‘lish imkoniyatlariga ega bo‘ladi. Jazolash mexanizmlari mavjud emas, kommunikatsiya to‘liq ijobiy rag‘batga asoslangan.</p>
            <p>  - Supermarket va ovqatlanish voucherlari, transport va onlayn xarid chegirmalari;</p>
            <p>  - GowRewards orqali tugallangan vazifalar hamda National Steps challenge tugatganlar uchun pul sovg‘alari;</p>
            <p>  - Leaderboard reytingi (eng faol fuqarolar ro‘yxati);</p>
            <p>  - “Smart Nation Ambassador” statusi (rasmiy sertifikat va tadbirlarda ishtirok etish imkoniyati;</p>
            <p>  - Sport zaliga kirish, sport kiyimlari, sog‘liq mahsulotlariga chegirmalar va obunalar;</p>
            <p>  - Pilot loyihalarda beta-tester bo‘lish uchun ustuvorlik (yangi app yoki xizmatlarga oldinoroq kirish), tadbirlar va treninglarga bepul takliflar.</p>
            <p>Ushbu model ixtiyoriylik funksiyasi bilan boshqa modellardan ajralib turadi va uning kuchli tomonlari ixtiyoriy va gamifikatsiya elementlari (o‘yinlashuv, mukofotlar) orqali fuqarolarni faollikka rag‘batlantirish, ijobiy rag‘batlar (chegirmalar, virtual birliklar) va ijtimoiy e’tirof (leaderboard, badges) orqali ishonchni oshirish, raqamli qulayliklar va sog‘liq dasturlari (Healthy 365 app) bilan integratsiyalarda iborat. Har bir modelda yutuqli jihatlari bilan birga kamchiliklari bo‘lgani kabi, ushbu modelning zaif tomonlari quyidagilardan iborat: faollik chastotasi va sifatiga bog‘liqligi tufayli raqamli savodxonligi past aholini chetlatishi mumkin; repressiv elementlar yo‘q, lekin platformalarga bog‘liqlik (SingPass) maxfiylik xavfini oshirishi mumkin.</p>
            <h3>2.3. Estoniya</h3>
            <p>Estoniyada e-Estonia loyihasi (1990-yillarning oxiridan boshlab) fuqarolarning raqamli ishtirokini baholashda ochiq ball tizimidan foydalanmaydi, biroq ishtirokni rag‘batlantiruvchi mexanizmlar aniq shakllangan. Tizim repressiv elementlarsiz va majburiy ball yoki reytinglarsiz ishlaydi, aksincha, raqamli qulayliklar va jarayonlarni soddalashtirish orqali fuqarolarni faollikka undaydi. Kommunikatsiya roli ikki tomonlama aloqa va shaffoflikka asoslangan bo‘lib, fuqarolarning ishonchini oshirishga xizmat qiladi.</p>
            <p>Estoniya tajribasida fuqarolarning ijtimoiy ishtiroki birinchi navbatda raqamli muhitda amalga oshiriladigan aniq harakatlar orqali namoyon bo‘ladi. Ushbu harakatlar qatoriga elektron saylovlarda (i-voting) qatnashish, normativ-huquqiy hujjatlar va qonun loyihalarini muhokama qilish, shuningdek, shaxsiy ma’lumotlarni o‘z vaqtida yangilash kiradi. Fuqarolar elektron saylov tizimi orqali masofadan turib ovoz berish imkoniyatiga ega bo‘lib, bu ularning siyosiy jarayonlarda ishtirok etishini ta’minlaydi. Shu bilan birga, Rahvaalgatus.ee platformasi orqali kollektiv takliflar va elektron petitsiyalar yaratish, ularni muhokama qilish hamda imzolash fuqarolarning qonunchilik jarayonidagi faol ishtirokini ifodalaydi. Bundan tashqari, elektron identifikatsiya tizimi (e-ID) orqali soliq deklaratsiyalarini topshirish, sog‘liqni saqlash ma’lumotlarini ko‘rish va boshqa elektron davlat xizmatlaridan foydalanish fuqarolarning kundalik raqamli faolligini shakllantiradi. Mazkur harakatlar Estoniyada ijtimoiy ishtirokni yuzaga keltiruvchi asosiy kommunikatsion inputlar sifatida namoyon bo‘ladi.</p>
            <p>Estoniya tajribasida fuqarolarning faolligi to‘g‘ridan-to‘g‘ri ball, chegirma yoki moddiy rag‘batlarga aylantirilmaydi, biroq tizimning o‘zi bir qator institutsional qulayliklarni taqdim etadi. Avvalo, elektron saylov (i-voting) orqali fuqarolar masofadan turib ovoz berish imkoniyatiga ega bo‘lib, bu saylov kuni navbatlarda turish zaruratini bartaraf etadi, xorijda yashovchi fuqarolar uchun esa siyosiy jarayonlarda ishtirokni sezilarli darajada yengillashtiradi; bundan tashqari, ovozni bir necha marta berish va faqat oxirgi ovozning hisobga olinishi kabi mexanizmlar ishtirok qulayligini oshiradi. Shuningdek, elektron identifikatsiya (e-ID) orqali soliq deklaratsiyalarini qisqa vaqt ichida topshirish, sog‘liqni saqlash ma’lumotlariga kirish yoki biznesni ro‘yxatdan o‘tkazish jarayonlari tezlashtiriladi. Fuqarolarning siyosiy ta’siri Rahvaalgatus.ee platformasi orqali kuchayib, muayyan miqdorda imzo to‘plangan takliflar parlament darajasida muhokama qilinadi va rasmiy javob beriladi, ayrim hollarda esa bunday tashabbuslar qonunchilikka integratsiya qilinadi. Muhim jihati shundaki, mazkur modelda ochiq reyting yoki jazolovchi mexanizmlar mavjud emas; aksincha, fuqarolarga o‘z ma’lumotlari ustidan nazorat qilish imkoniyatining berilishi va raqamli ishtirokning normaga aylanishi jamiyatda ijtimoiy ishonch va norasmiy obro‘ning shakllanishiga xizmat qiladi.</p>
            <p>Estoniya modeli o‘zida repressive va rag‘bat elementlarini jamlamaganligi bilan boshqa modellardan farq qiladi. Aniqlash uchun, ushbu modelda raqamli faollik uchun rag‘batlar umumiy ijtimoiy foyda (vaqt tejalishi, demokratiya darajasining oshishi) sifatida ko‘riladi. Modelni ajratib turadigan xususiyatlar: shaffoflik va ishonchga asoslangan (fuqarolar ma’lumotlarini nazorat qilish, X-Road tizimi), ixtiyoriy ishtirok va raqamli qulayliklar (i-voting, Rahvaalgatus.ee) orqali siyosiy va kundalik jarayonlarni yengillashtirish, repressive mexanizmlarsiz, BMT E-Government indeksi bo'yicha yuqori o‘rin (1-3). Modelda ko‘rish mumkin bo‘lgan zaif jihatlar: moddiy rag‘batlar yo‘qligi tufayli faollik darajasi past bo‘lishi mumkin, raqamli infratuzilmaga bog‘liqlik, bu raqamli bo‘linishni kuchaytirishi mumkin.</p>

            <h2>3. Xulosa</h2>
            <p>Mazkur maqolada smart governance jarayonlarida fuqarolarning ijtimoiy ishtirokini oshirishda kommunikatsiyaning o‘rni xorijiy tajribalar asosida qiyosiy tahlil qilindi. Tadqiqot natijalari shuni ko‘rsatadiki, kommunikatsiya mexanizmlari fuqarolarni davlat boshqaruvi jarayonlariga jalb etishda muhim institutsional omil bo‘lib, u fuqarolarni passiv axborot iste’molchidan faol hamkor darajasiga olib chiqishga xizmat qiladi. Xorijiy amaliyotlar kommunikatsiyaning faqat axborot uzatish vositasi emas, balki fuqarolar faolligini baholash, rag‘batlantirish va barqarorlashtirish mexanizmi sifatida ishlashini tasdiqlaydi.</p>
            <p>Xitoyning Social Credit System tajribasi kommunikatsiyani fuqarolarning ijtimoiy va iqtisodiy xatti-harakatlarini baholash orqali tartibga solishga yo‘naltirilgan model sifatida namoyon bo‘ladi. Ushbu yondashuv ijtimoiy intizom va javobgarlikni kuchaytirishga xizmat qilgan bo‘lsa-da, jazolovchi elementlarning mavjudligi shaxsiy ma’lumotlar daxlsizligi va fuqarolik erkinliklari bilan bog‘liq muammolarni keltirib chiqarishi mumkin. Singapur tajribasi esa kommunikatsiyani ixtiyoriy va ijobiy rag‘batlarga asoslangan hamkorlik mexanizmi sifatida talqin qilib, raqamli platformalar orqali fuqarolar faolligini oshirishning samarali modelini taqdim etadi. Estoniyaning e-Estonia modeli kommunikatsiyani ijtimoiy ishonch infratuzilmasi sifatida shakllantirib, repressiv vositalarsiz fuqarolar ishtirokini qo‘llab-quvvatlash mumkinligini amalda ko‘rsatadi.</p>
            <p>O‘zbekiston sharoitida smart governance tizimlarini rivojlantirishda xorijiy tajribalarni to‘g‘ridan-to‘g‘ri ko‘chirishdan ko‘ra, ularni moslashtirish maqsadga muvofiqdir. Xususan, mahalliy pilot loyihalar orqali bosqichma-bosqich sinovdan o‘tkaziladigan, faqat ijobiy rag‘batlarga asoslangan reputatsion mexanizmlar fuqarolarni jalb etishda istiqbolli yondashuv sifatida ko‘rib chiqilishi mumkin. Bunda jazolovchi elementlardan voz kechish, fuqarolarning roziligi va ma’lumotlar maxfiyligini ta’minlash asosiy tamoyillar sifatida belgilanishi lozim.</p>
            <p>Amaliy jihatdan, rivojlanayotgan mamlakatlarda smart governance tizimlarini joriy etishda quyidagi yo‘nalishlarga ustuvor ahamiyat berish tavsiya etiladi: birinchidan, raqamli platformalar va qayta aloqa mexanizmlarini keng joriy etish orqali fuqarolar ishtirokini qulaylashtirish; ikkinchidan, etik standartlar va shaxsiy ma’lumotlarni himoya qilish mexanizmlarini kuchaytirish; uchinchidan, raqamli savodxonlikni oshirish orqali jamiyatning barcha qatlamlarini raqamli boshqaruv jarayonlariga qamrab olish. Ushbu yondashuvlar smart governance tizimlarining barqaror va inkluziv rivojlanishiga xizmat qiladi.</p>
            <p>Kelgusidagi tadqiqotlar kommunikatsiya mexanizmlarining sun’iy intellekt va blokcheyn texnologiyalari bilan integratsiyasi, shuningdek, reputatsion ishtirok modellarining ijtimoiy adolat va ishonchga ta’sirini chuqurroq o‘rganishga yo‘naltirilishi maqsadga muvofiqdir. Bu esa smart governance tizimlarini yanada samarali, shaffof va fuqarolarga yo‘naltirilgan shaklda rivojlantirish imkonini beradi.</p>

    { title: "Sabr-toqat meva beradi! 🍀", msg: "Maqolani tugatish yaqinlashmoqda." },
];

// ── INIT ──────────────────────────────────
let articleId = '';
let selectedRating = 0;
let toastTimer = null;
let shownToasts = [];

window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    articleId = params.get('id') || 'article-1';

    const data = articles[articleId];
    if (!data) return;

    document.title = data.title + ' | Asilbek Sodiqov';
    document.getElementById('art-year').innerHTML = `<i class="fas fa-calendar"></i> ${data.year}`;
    document.getElementById('art-title').textContent = data.title;
    document.getElementById('art-body').innerHTML = data.body;

    initProgressBar();
    initRatingModal();
});

// ── PROGRESS BAR ─────────────────────────
const toastTriggers = [25, 50, 75]; // foizda qachon toast chiqarish

function initProgressBar() {
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
}

function onScroll() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? Math.round((scrollTop / docHeight) * 100) : 0;

    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('pct-text').textContent = pct + '%';

    // Toast triggerlarini tekshirish
    toastTriggers.forEach(trigger => {
        if (pct >= trigger && !shownToasts.includes(trigger)) {
            shownToasts.push(trigger);
            showMotivationalToast();
        }
    });
}

function showMotivationalToast() {
    const available = motivationalMessages.filter((_, i) => !shownToasts.includes(i));
    const pool = available.length > 0 ? available : motivationalMessages;
    const pick = pool[Math.floor(Math.random() * pool.length)];

    const toast = document.getElementById('artToast');
    document.getElementById('toastTitle').textContent = pick.title;
    document.getElementById('toastMsg').textContent = pick.msg;

    if (toastTimer) clearTimeout(toastTimer);
    toast.classList.remove('show');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }));
}

// ── FINISH ────────────────────────────────
function finishArticle() {
    openRatingModal();
}

function goBack() {
    if (document.referrer && document.referrer.includes(location.hostname)) {
        history.back();
    } else {
        window.location.href = 'index.html#projects';
    }
}

// ── RATING MODAL ──────────────────────────
function initRatingModal() {
    const stars = document.querySelectorAll('.modal-star-btn');
    const labels = ['', 'Yomon', 'Qoniqarli', 'Yaxshi', 'Juda yaxshi', "Zo'r!"];

    stars.forEach(star => {
        star.addEventListener('mouseenter', () => {
            const v = +star.dataset.value;
            stars.forEach(s => s.classList.toggle('hovered', +s.dataset.value <= v));
            document.getElementById('modalRatingLabel').textContent = labels[v];
        });
        star.addEventListener('mouseleave', () => {
            stars.forEach(s => s.classList.remove('hovered'));
            document.getElementById('modalRatingLabel').textContent =
                selectedRating ? labels[selectedRating] : 'Yulduzni tanlang';
        });
        star.addEventListener('click', () => {
            selectedRating = +star.dataset.value;
            stars.forEach(s => s.classList.toggle('selected', +s.dataset.value <= selectedRating));
            document.getElementById('modalRatingLabel').textContent = labels[selectedRating];
            document.getElementById('modalRateBtn').disabled = false;
        });
    });
}

function openRatingModal() {
    document.getElementById('ratingModalOverlay').classList.add('active');
}

function skipRating() {
    document.getElementById('ratingModalOverlay').classList.remove('active');
    setTimeout(() => goBack(), 300);
}

function submitModalRating() {
    if (!selectedRating) return;

    const btn = document.getElementById('modalRateBtn');
    const articleTitle = articles[articleId]?.title || articleId;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    fetch(`https://api.telegram.org/bot8561049037:AAEbMoh0BTPRx5mUR99ui-uyg764vGO8spY/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: '7123672881',
            text: `📄 Maqola bahosi | sodiqov.uz\n📝 Maqola: ${articleTitle}\n${'⭐'.repeat(selectedRating)}${'☆'.repeat(5 - selectedRating)} (${selectedRating}/5)`
        })
    })
    .then(() => {
        document.getElementById('modalBtns').style.display = 'none';
        document.getElementById('modalSuccess').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('ratingModalOverlay').classList.remove('active');
            setTimeout(() => goBack(), 300);
        }, 2000);
    })
    .catch(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Baholash';
    });
}
</script>
